<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Congrès REMPART 2026 — Planning</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: #0d0d1a;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                font-family:
                    "Segoe UI",
                    system-ui,
                    -apple-system,
                    sans-serif;
                overflow: hidden;
            }

            #slide {
                width: 1920px;
                height: 1080px;
                background: #12122a;
                position: relative;
                transform-origin: top left;
                overflow: hidden;
            }

            #bg-texture {
                position: absolute;
                inset: 0;
                background:
                    radial-gradient(
                        ellipse at 20% 50%,
                        rgba(139, 94, 131, 0.08) 0%,
                        transparent 60%
                    ),
                    radial-gradient(
                        ellipse at 80% 20%,
                        rgba(200, 121, 65, 0.06) 0%,
                        transparent 50%
                    ),
                    radial-gradient(
                        ellipse at 60% 90%,
                        rgba(123, 158, 191, 0.07) 0%,
                        transparent 50%
                    );
                pointer-events: none;
            }

            header {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 110px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: linear-gradient(
                    180deg,
                    rgba(18, 18, 42, 1) 0%,
                    rgba(18, 18, 42, 0.95) 70%,
                    transparent 100%
                );
                padding: 0 60px;
                z-index: 10;
            }

            header h1 {
                font-size: 38px;
                font-weight: 700;
                color: #f0e6d3;
                letter-spacing: 0.12em;
                text-transform: uppercase;
            }

            header h1 span {
                color: #d4a84b;
            }

            header p {
                font-size: 18px;
                color: #9a8f7a;
                margin-top: 6px;
                letter-spacing: 0.06em;
            }

            #gantt-area {
                position: absolute;
                top: 110px;
                left: 0;
                right: 0;
                bottom: 72px;
            }

            .day-row {
                position: absolute;
                left: 0;
                right: 0;
                height: 253px;
            }

            #row-0 {
                top: 0;
            }
            #row-1 {
                top: 253px;
                border-top: 1px solid rgba(255, 255, 255, 0.07);
            }
            #row-2 {
                top: 506px;
                border-top: 1px solid rgba(255, 255, 255, 0.07);
            }

            .day-label {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                width: 120px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: rgba(255, 255, 255, 0.025);
                border-right: 1px solid rgba(255, 255, 255, 0.08);
                z-index: 5;
            }

            .day-label .day-name {
                font-size: 13px;
                font-weight: 700;
                color: #d4a84b;
                text-transform: uppercase;
                letter-spacing: 0.12em;
                writing-mode: horizontal-tb;
            }

            .day-label .day-date {
                font-size: 22px;
                font-weight: 700;
                color: #f0e6d3;
                margin-top: 4px;
            }

            .day-label .day-month {
                font-size: 11px;
                color: #6e6e8a;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                margin-top: 2px;
            }

            .timeline-container {
                position: absolute;
                left: 120px;
                right: 0;
                top: 0;
                bottom: 0;
            }

            .hour-ticks {
                position: absolute;
                left: 0;
                right: 0;
                top: 0;
                bottom: 0;
                pointer-events: none;
                z-index: 1;
            }

            .hour-tick {
                position: absolute;
                top: 0;
                bottom: 0;
                width: 1px;
                background: rgba(255, 255, 255, 0.05);
            }

            .hour-label {
                position: absolute;
                top: 8px;
                transform: translateX(-50%);
                font-size: 10px;
                color: rgba(255, 255, 255, 0.25);
                font-weight: 500;
                letter-spacing: 0.04em;
            }

            .blocks-layer {
                position: absolute;
                left: 0;
                right: 0;
                top: 32px;
                bottom: 16px;
            }

            .block {
                position: absolute;
                top: 0;
                bottom: 0;
                border-radius: 5px;
                cursor: default;
                overflow: hidden;
                display: flex;
                align-items: center;
                padding: 0 8px;
                border: 1px solid rgba(255, 255, 255, 0.12);
                transition:
                    filter 0.15s,
                    transform 0.15s;
            }

            .block:hover {
                filter: brightness(1.2);
                transform: scaleY(1.04);
                z-index: 100;
            }

            .block-text {
                font-size: 11px;
                font-weight: 600;
                color: rgba(255, 255, 255, 0.92);
                line-height: 1.2;
                pointer-events: none;
                overflow-wrap: break-word;
                word-break: break-word;
            }

            .block-list {
                display: flex;
                flex-direction: column;
                gap: 4px;
                pointer-events: none;
            }

            .block-list-item {
                font-size: 10px;
                font-weight: 600;
                color: rgba(255, 255, 255, 0.92);
                line-height: 1.2;
                overflow-wrap: break-word;
                word-break: break-word;
                padding: 2px 0 2px 7px;
                border-left: 3px solid rgba(255, 255, 255, 0.35);
                pointer-events: none;
            }

            .block-time {
                font-size: 9px;
                color: rgba(255, 255, 255, 0.55);
                white-space: nowrap;
                pointer-events: none;
                margin-top: 1px;
            }

            .block-loc {
                font-size: 9px;
                font-style: italic;
                color: rgba(255, 255, 255, 0.6);
                pointer-events: none;
                margin-top: 1px;
                overflow-wrap: break-word;
                word-break: break-word;
            }

            .block-inner {
                display: flex;
                flex-direction: column;
                overflow: hidden;
                pointer-events: none;
            }

            .block.highlight {
                border: 2px solid #e84040;
                box-shadow:
                    0 0 12px rgba(232, 64, 64, 0.5),
                    inset 0 0 8px rgba(232, 64, 64, 0.15);
            }

            .block.highlight .block-text {
                color: #ffffff;
                font-weight: 800;
            }

            .day-separator {
                position: absolute;
                left: 0;
                right: 0;
                height: 1px;
                background: rgba(255, 255, 255, 0.07);
            }

            .day-separator:nth-child(2) {
                top: 253px;
            }
            .day-separator:nth-child(3) {
                top: 506px;
            }

            #tooltip {
                position: fixed;
                background: rgba(18, 18, 42, 0.97);
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 6px;
                padding: 10px 14px;
                pointer-events: none;
                z-index: 1000;
                display: none;
                max-width: 280px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            }

            #tooltip .tt-time {
                font-size: 12px;
                color: #d4a84b;
                font-weight: 700;
                letter-spacing: 0.05em;
                margin-bottom: 4px;
            }

            #tooltip .tt-title {
                font-size: 14px;
                color: #f0e6d3;
                font-weight: 600;
                line-height: 1.4;
            }

            #tooltip .tt-cat {
                font-size: 10px;
                color: #6e6e8a;
                margin-top: 4px;
                text-transform: uppercase;
                letter-spacing: 0.08em;
            }

            #legend {
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                height: 72px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 32px;
                border-top: 1px solid rgba(255, 255, 255, 0.06);
                background: rgba(12, 12, 26, 0.8);
            }

            .legend-item {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .legend-swatch {
                width: 14px;
                height: 14px;
                border-radius: 3px;
                flex-shrink: 0;
            }

            .legend-label {
                font-size: 12px;
                color: rgba(255, 255, 255, 0.55);
                letter-spacing: 0.04em;
            }

            .row-bg-alt {
                position: absolute;
                inset: 0;
                background: rgba(255, 255, 255, 0.015);
            }
        </style>
    </head>

        <script>
            (function () {
                const START_MIN = 390;
                const END_MIN = 1470;
                const TOTAL_MIN = END_MIN - START_MIN;

                const COLORS = {
                    transport: "#7B9EBF",
                    repas: "#7EAF7A",
                    patrimoine: "#C87941",
                    institutionnel: "#8B5E83",
                    festif: "#D4A84B",
                };

                const CAT_LABELS = {
                    transport: "Déplacements / Transports",
                    repas: "Repas",
                    patrimoine: "Visites / Patrimoine",
                    institutionnel: "Institutionnel / AG",
                    festif: "Festif / Soirée",
                };

                function toMin(h, m) {
                    return h * 60 + m;
                }
                function fmtTime(h, m) {
                    return (
                        String(h).padStart(2, "0") +
                        "h" +
                        String(m).padStart(2, "0")
                    );
                }

                const days = [
                    {
                        id: 0,
                        events: [
                            {
                                start: toMin(9, 30),
                                end: toMin(11, 0),
                                cat: "transport",
                                label: "09h30 Paris Nord → 10h35 Amiens\n10h29 Paris Nord → 11h35 Amiens",
                                loc: "K16 · Direct",
                                highlight: true,
                            },
                            {
                                start: toMin(11, 0),
                                end: toMin(12, 0),
                                cat: "transport",
                                label: "Accueil et trajet APPEVA",
                                loc: "Amiens · APPEVA",
                            },
                            {
                                start: toMin(12, 0),
                                end: toMin(13, 30),
                                cat: "repas",
                                label: "Accueil APEVA + Déjeuner",
                                loc: "Amiens · APEVA",
                            },
                            {
                                start: toMin(13, 30),
                                end: toMin(15, 0),
                                cat: "patrimoine",
                                label: "Visite du site et tour en train",
                                loc: "Amiens · APEVA",
                            },
                            {
                                start: toMin(15, 0),
                                end: toMin(16, 30),
                                cat: "transport",
                                label: "15h Retour car\n15h30 Installation\n16h Transfert",
                                loc: "→ Moyembrie",
                            },
                            {
                                start: toMin(16, 30),
                                end: toMin(19, 0),
                                cat: "institutionnel",
                                label: "Table ronde — Patrimoine et numérique",
                                loc: "Moyembrie",
                            },
                            {
                                start: toMin(19, 0),
                                end: toMin(21, 0),
                                cat: "festif",
                                label: "Top départ barnum\n[institutionnel]Protocole — élus & distinctions\nApéritif",
                                loc: "Moyembrie",
                            },
                            {
                                start: toMin(21, 0),
                                end: toMin(23, 0),
                                cat: "repas",
                                label: "Dîner + Animation",
                                loc: "Moyembrie",
                            },
                            {
                                start: toMin(23, 0),
                                end: toMin(23, 30),
                                cat: "transport",
                                label: "Moyembrie → Hébergements",
                                loc: "→ AROEVEN · Coucy",
                            },
                        ],
                    },
                    {
                        id: 1,
                        events: [
                            {
                                start: toMin(7, 0),
                                end: toMin(9, 0),
                                cat: "repas",
                                label: "Réveil\n08h00 Départ minibus\nPetit déjeuner",
                                loc: "→ Moyembrie",
                            },
                            {
                                start: toMin(9, 0),
                                end: toMin(12, 0),
                                cat: "institutionnel",
                                label: "09h00 Émargement\n09h45 Top départ AG\n10h00 Assemblée générale",
                                loc: "Moyembrie · Salle AG",
                            },
                            {
                                start: toMin(12, 0),
                                end: toMin(13, 0),
                                cat: "repas",
                                label: "Déjeuner — La Marmite",
                                loc: "Moyembrie",
                            },
                            {
                                start: toMin(13, 0),
                                end: toMin(15, 0),
                                cat: "institutionnel",
                                label: "Suite AG et ateliers d'orientation",
                                loc: "Moyembrie · Salle AG",
                            },
                            {
                                start: toMin(15, 0),
                                end: toMin(17, 0),
                                cat: "patrimoine",
                                label: "Temps libre / Fin AG",
                                loc: "Moyembrie",
                            },
                            {
                                start: toMin(17, 0),
                                end: toMin(17, 30),
                                cat: "transport",
                                label: "Moyembrie → Coucy",
                                loc: "",
                            },
                            {
                                start: toMin(17, 30),
                                end: toMin(19, 0),
                                cat: "patrimoine",
                                label: "Visites thématiques AMVCC + temps libre",
                                loc: "Coucy · AMVCC",
                            },
                            {
                                start: toMin(19, 0),
                                end: toMin(20, 0),
                                cat: "festif",
                                label: "Apéritif Bourgogne (AROEVEN)",
                                loc: "Coucy-le-Château",
                            },
                            {
                                start: toMin(20, 0),
                                end: toMin(21, 30),
                                cat: "repas",
                                label: "Dîner AROEVEN",
                                loc: "Coucy-le-Château",
                            },
                            {
                                start: toMin(21, 30),
                                end: toMin(22, 30),
                                cat: "festif",
                                label: "Animations nocturnes",
                                loc: "Coucy-le-Château",
                            },
                            {
                                start: toMin(22, 30),
                                end: toMin(24, 0),
                                cat: "festif",
                                label: "After association",
                                loc: "Coucy-le-Château",
                            },
                        ],
                    },
                    {
                        id: 2,
                        events: [
                            {
                                start: toMin(6, 30),
                                end: toMin(9, 0),
                                cat: "repas",
                                label: "Réveil\n08h00 Petit déjeuner (AROEVEN)",
                                loc: "AROEVEN · Coucy",
                            },
                            {
                                start: toMin(9, 0),
                                end: toMin(10, 0),
                                cat: "transport",
                                label: "Coucy → Berzy",
                                loc: "",
                            },
                            {
                                start: toMin(10, 0),
                                end: toMin(11, 0),
                                cat: "patrimoine",
                                label: "Visite du château de Berzy",
                                loc: "Berzy · ASPAM",
                            },
                            {
                                start: toMin(11, 0),
                                end: toMin(11, 30),
                                cat: "transport",
                                label: "Berzy → Valsery",
                                loc: "",
                            },
                            {
                                start: toMin(11, 30),
                                end: toMin(12, 45),
                                cat: "patrimoine",
                                label: "Visite de l'Abbaye de Valsery",
                                loc: "Valsery",
                            },
                            {
                                start: toMin(12, 45),
                                end: toMin(13, 45),
                                cat: "repas",
                                label: "Déjeuner champêtre à l'Abbaye",
                                loc: "Valsery",
                            },
                            {
                                start: toMin(13, 45),
                                end: toMin(14, 0),
                                cat: "transport",
                                label: "Valsery → Villers-Cotterêts",
                                loc: "",
                            },
                            {
                                start: toMin(14, 0),
                                end: toMin(16, 0),
                                cat: "patrimoine",
                                label: "Cité Internationale\nde la langue française",
                                loc: "Villers-Cotterêts",
                            },
                            {
                                start: toMin(16, 0),
                                end: toMin(16, 31),
                                cat: "transport",
                                label: "Villers-Cotterêts → Gare",
                                loc: "",
                            },
                            {
                                start: toMin(16, 31),
                                end: toMin(18, 5),
                                cat: "transport",
                                label: "16h31 Villers-Cotterêts → 18h05 Paris Nord",
                                loc: "TER K15",
                                highlight: true,
                            },
                        ],
                    },
                ];

                function pct(minutes) {
                    return Math.max(
                        0,
                        Math.min(
                            100,
                            ((minutes - START_MIN) / TOTAL_MIN) * 100,
                        ),
                    );
                }

                function buildTicks(container, rowIndex) {
                    const startH = Math.ceil(START_MIN / 60);
                    const endH = Math.floor(END_MIN / 60);
                    for (let h = startH; h <= endH; h++) {
                        const min = h * 60;
                        const left = pct(min);
                        const tick = document.createElement("div");
                        tick.className = "hour-tick";
                        tick.style.left = left + "%";
                        container.appendChild(tick);

                        if (rowIndex === 0) {
                            const lbl = document.createElement("div");
                            lbl.className = "hour-label";
                            lbl.style.left = left + "%";
                            lbl.textContent = (h < 24 ? h : h - 24) + "h";
                            container.appendChild(lbl);
                        }
                    }
                }

                function buildBlocks(container, events) {
                    events.forEach(function (ev) {
                        const leftPct = pct(ev.start);
                        const rightPct = pct(ev.end);
                        const widthPct = rightPct - leftPct;
                        if (widthPct <= 0) return;

                        const block = document.createElement("div");
                        block.className =
                            "block" + (ev.highlight ? " highlight" : "");
                        block.style.left = leftPct + "%";
                        block.style.width = widthPct + "%";
                        block.style.background = ev.highlight
                            ? "linear-gradient(135deg, #8b0000 0%, #c0392b 100%)"
                            : COLORS[ev.cat];

                        const startH = Math.floor(ev.start / 60);
                        const startM = ev.start % 60;
                        const endH = Math.floor(ev.end / 60);
                        const endM = ev.end % 60;
                        const timeStr =
                            fmtTime(startH, startM) +
                            " – " +
                            fmtTime(endH, endM);

                        const inner = document.createElement("div");
                        inner.className = "block-inner";

                        if (ev.label.includes("\n")) {
                            const list = document.createElement("div");
                            list.className = "block-list";
                            ev.label.split("\n").forEach(function (line) {
                                const item = document.createElement("div");
                                item.className = "block-list-item";
                                const catMatch = line.match(/^\[(\w+)\]/);
                                if (catMatch) {
                                    item.style.borderLeftColor =
                                        COLORS[catMatch[1]] ||
                                        "rgba(255,255,255,0.35)";
                                    item.textContent = line.slice(
                                        catMatch[0].length,
                                    );
                                } else {
                                    item.textContent = line;
                                }
                                list.appendChild(item);
                            });
                            inner.appendChild(list);
                        } else {
                            const textEl = document.createElement("div");
                            textEl.className = "block-text";
                            textEl.textContent = ev.label;
                            inner.appendChild(textEl);
                        }

                        if (widthPct > 2.5) {
                            const timeEl = document.createElement("div");
                            timeEl.className = "block-time";
                            timeEl.textContent = timeStr;
                            inner.appendChild(timeEl);
                        }
                        if (ev.loc && widthPct > 2.5) {
                            const locEl = document.createElement("div");
                            locEl.className = "block-loc";
                            locEl.textContent = ev.loc;
                            inner.appendChild(locEl);
                        }
                        block.appendChild(inner);

                        block.addEventListener("mousemove", function (e) {
                            const tip = document.getElementById("tooltip");
                            document.getElementById("tt-time").textContent =
                                timeStr;
                            document.getElementById("tt-title").textContent =
                                ev.label;
                            document.getElementById("tt-cat").textContent =
                                CAT_LABELS[ev.cat] || "";
                            tip.style.display = "block";

                            const slide = document.getElementById("slide");
                            const scaleVal =
                                parseFloat(
                                    slide.style.transform
                                        .replace("scale(", "")
                                        .replace(")", ""),
                                ) || 1;
                            const tx = parseFloat(slide.style.left) || 0;
                            const ty = parseFloat(slide.style.top) || 0;

                            let x = e.clientX + 16;
                            let y = e.clientY + 16;
                            if (x + 300 > window.innerWidth)
                                x = e.clientX - 300;
                            if (y + 100 > window.innerHeight)
                                y = e.clientY - 80;
                            tip.style.left = x + "px";
                            tip.style.top = y + "px";
                        });

                        block.addEventListener("mouseleave", function () {
                            document.getElementById("tooltip").style.display =
                                "none";
                        });

                        container.appendChild(block);
                    });
                }

                days.forEach(function (day) {
                    buildTicks(
                        document.getElementById("ticks-" + day.id),
                        day.id,
                    );
                    buildBlocks(
                        document.getElementById("blocks-" + day.id),
                        day.events,
                    );
                });

                function scaleSlide() {
                    const slide = document.getElementById("slide");
                    const scaleX = window.innerWidth / 1920;
                    const scaleY = window.innerHeight / 1080;
                    const scale = Math.min(scaleX, scaleY);
                    const offsetX = (window.innerWidth - 1920 * scale) / 2;
                    const offsetY = (window.innerHeight - 1080 * scale) / 2;
                    slide.style.transform = "scale(" + scale + ")";
                    slide.style.position = "absolute";
                    slide.style.left = offsetX + "px";
                    slide.style.top = offsetY + "px";
                }

                scaleSlide();
                window.addEventListener("resize", scaleSlide);
            })();
        </script>
    </body>
